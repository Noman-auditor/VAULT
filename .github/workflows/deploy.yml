name: 🔒 VAULT — Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # NOTE: cache: 'npm' removed — requires package-lock.json
          # Run 'npm install' once locally and commit package-lock.json to enable caching

      - name: Install dependencies
        run: npm install

      - name: Generate lock file if missing
        run: |
          [ ! -f package-lock.json ] && npm install --package-lock-only || true
          echo "✓ Lock file ready"

      - name: Syntax check all backend JS
        run: |
          find backend -name "*.js" | while read f; do
            node --check "$f" && echo "✓ $f" || (echo "✗ $f" && exit 1)
          done

      - name: Verify required files
        run: |
          for f in backend/server.js backend/services/bitcoin.js backend/services/wallet.js \
                   backend/routes/wallet.js backend/routes/transactions.js \
                   backend/middleware/auth.js public/index.html vercel.json package.json; do
            [ -f "$f" ] && echo "✓ $f" || (echo "✗ MISSING: $f" && exit 1)
          done

  preview:
    name: 🔍 Preview Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g vercel@latest
      - run: npm install
      - run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: echo "url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Preview Ready\n**URL:** ${{ steps.deploy.outputs.url }}\n**Health:** ${{ steps.deploy.outputs.url }}/api/health\n**Commit:** \`${{ github.sha }}\``
            })

  production:
    name: 🚀 Production Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g vercel@latest
      - run: npm install
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - id: deploy
        run: echo "url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT
      - name: Smoke test
        run: |
          sleep 10
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/api/health")
          [ "$CODE" = "200" ] && echo "✅ Health OK" || (echo "❌ Failed HTTP $CODE" && exit 1)
      - run: echo "✅ Deployed → ${{ steps.deploy.outputs.url }}"
